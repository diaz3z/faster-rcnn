seed: 42
device: auto

dataset:
  train:
    img_dir: D:\ZAID\Face Detection.v27i.coco\train
    ann_file: D:\ZAID\Face Detection.v27i.coco\train\_annotations.coco.json
  val:
    img_dir: D:\ZAID\Face Detection.v27i.coco\valid
    ann_file: D:\ZAID\Face Detection.v27i.coco\valid\_annotations.coco.json

model:
  num_classes: 3
  pretrained: true
  class_names:
    - Background
    - faces
    - face

dataloader:
  batch_size: 4
  shuffle: true
  num_workers: 0

optimizer:
  name: SGD
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0005

scheduler:
  enabled: true
  step_size: 3
  gamma: 0.1

train:
  num_epochs: 5

output:
  dir: outputs
  save_every: 1
  checkpoint_pattern: fasterrcnn_resnet50_epoch_{epoch}.pth
  final_model_name: fasterrcnn_final.pth
